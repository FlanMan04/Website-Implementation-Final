<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Tic‑Tac‑Toe (PyScript)</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

</head>
<body>
    <h1>Tic‑Tac‑Toe</h1>
    <div class="board" id="board">
        <button class="cell" id="cell0"> </button>
        <button class="cell" id="cell1"> </button>
        <button class="cell" id="cell2"> </button>
        <button class="cell" id="cell3"> </button>
        <button class="cell" id="cell4"> </button>
        <button class="cell" id="cell5"> </button>
        <button class="cell" id="cell6"> </button>
        <button class="cell" id="cell7"> </button>
        <button class="cell" id="cell8"> </button>
    </div>
    <div id="message">Player X's turn</div>
    <button id="resetBtn">New Game</button>

    <!-- Load the Python logic from a separate file -->
    <script type="py" src="./tictactoe.py"></script>
</body>

<style>
    body {
        text-align: center;
        font-family: monospace;
    }
    .board {
        display: grid;
        grid-template-columns: repeat(3, 80px);
        gap: 5px;
        justify-content: center;
        margin: 20px auto;
    }
    .cell {
        width: 80px;
        height: 80px;
        font-size: 2rem;
        font-weight: bold;
        background: #f0f0f0;
        border: 2px solid #333;
        cursor: pointer;
    }
    .cell:disabled {
        cursor: not-allowed;
        background: #e0e0e0;
    }
    #message {
        font-size: 1.2rem;
        margin: 10px;
    }
    button {
        font-size: 1rem;
        padding: 5px 15px;
    }
</style>

</html>
